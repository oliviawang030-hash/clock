<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZMDDTT</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #B2C8BA;
      }

      .clock {
        width: 350px;
        height: 350px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url("https://i.meee.com.tw/DCUg5w4.png");
        background-size: cover;
        border: 4px solid #737373;
        border-radius: 50%;
        box-shadow: 0 15px 35px #0000004D;
      }

      .clock::before {
        content: "";
        position: absolute;
        width: 15px;
        height: 15px;
        background: #737373;
        border-radius: 50%;
        z-index: 10000;
      }

      .clock .hour,
      .clock .min,
      .clock .sec {
        position: absolute
      }

      .clock .hour,
      .hr {
        width: 160px;
        height: 160px;
      }

      .clock .min,
      .mn {
        width: 190px;
        height: 190px;
      }

      .clock .sec,
      .sc {
        width: 230px;
        height: 230px;
      }

      .hr,
      .mn,
      .sc {
        display: flex;
        justify-content: center;
        position: absolute;
        border-radius: 50px;
      }

      .hr::before {
        content: "";
        position: absolute;
        width: 8px;
        height: 80px;
        background: #5C6B73;
        z-index: 10;
        border-radius: 6px 6px 0 0;
      }

      .mn::before {
        content: "";
        position: absolute;
        width: 4px;
        height: 90px;
        background: #939196;
        z-index: 11;
        border-radius: 6px 6px 0 0;
      }

      .sc::before {
        content: "";
        position: absolute;
        width: 2px;
        height: 150px;
        background: #4A4A4A;
        z-index: 12;
        border-radius: 6px 6px 0 0;
      }
    </style>
  </head>

  <body>
    <div class="clock">
      <div class="hour">
        <div class="hr" id="hr"></div>
      </div>
      <div class="min">
        <div class="mn" id="mn"></div>
      </div>
      <div class="sec">
        <div class="sc" id="sc"></div>
      </div>
    </div>
    <script>
      const deg = 6;
      const hr = document.getElementById("hr");
      const mn = document.getElementById("mn");
      const sc = document.getElementById("sc");

      setInterval(() => {
        let day = new Date();
        let hh = day.getHours() * 30;
        let mm = day.getMinutes() * deg;
        let ss = day.getSeconds() * deg;

        hr.style.transform = `rotateZ(${(hh) + (mm / 12)}deg)`;
        mn.style.transform = `rotateZ(${mm}deg)`;
        sc.style.transform = `rotateZ(${ss}deg)`;
      });
    </script>
  </body>

</html>
